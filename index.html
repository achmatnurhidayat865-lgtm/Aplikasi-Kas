<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asheeqa Printing POS</title>
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --success: #27ae60; --danger: #c0392b; --mutasi: #e67e22; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1em; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; color: white; }
        .btn-add { background: #f8f9fa; color: #555; border: 1px dashed #bbb; margin-bottom: 10px; }
        .item-row { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .row-flex { display: flex; gap: 8px; }
        .dash-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #2c3e50; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .dash-card { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; }
        .info-dp { background: #fdfaf0; border: 1px solid #f39c12; padding: 10px; border-radius: 8px; margin: 10px 0; color: #d35400; font-size: 14px; }
    </style>
</head>
<body>

    <!-- DASHBOARD SALDO REAL-TIME -->
    <div class="dash-box">
        <div style="grid-column: span 2; font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 5px;">Ringkasan Saldo Asheeqa</div>
        <div class="dash-card"><small>Cash</small><br><b id="d_cash">Rp 0</b></div>
        <div class="dash-card"><small>BRI</small><br><b id="d_bri">Rp 0</b></div>
        <div class="dash-card"><small>BNI</small><br><b id="d_bni">Rp 0</b></div>
        <div class="dash-card" style="background: var(--success);"><small>Untung</small><br><b id="d_laba">Rp 0</b></div>
    </div>

    <!-- 1. KALKULATOR ESTIMASI & WA -->
    <div class="container" style="border-top: 5px solid var(--accent);">
        <h2 style="color: var(--accent);">Kalkulator Estimasi</h2>
        <input type="text" id="est_cs" placeholder="Nama Pelanggan">
        <div id="estCont">
            <div class="item-row e-row">
                <input type="text" class="en" placeholder="Item">
                <div class="row-flex">
                    <input type="number" class="eq" placeholder="Qty" oninput="hitungEst()">
                    <input type="number" class="eh" placeholder="Harga" oninput="hitungEst()">
                </div>
            </div>
        </div>
        <button class="btn-add" onclick="tambahBaris('estCont', 'e-row')">+ Tambah Item</button>
        <div class="info-dp">
            <b>Total Estimasi: <span id="et_val">Rp 0</span></b><br>
            Rekomendasi DP (50%): <span id="edp_val">Rp 0</span>
        </div>
        <button onclick="kirimWA()" style="background: #25D366;">📱 KIRIM KE WHATSAPP</button>
    </div>

    <!-- 2. INPUT NOTA PESANAN -->
    <div class="container" style="border-top: 5px solid var(--primary);">
        <h2 style="color: var(--primary);">Input Nota Pesanan</h2>
        <input type="text" id="cs" placeholder="Nama Pelanggan">
        <select id="metode"><option value="Cash">Cash</option><option value="BRI">BRI</option><option value="BNI">BNI</option></select>
        <div id="notaCont">
            <div class="item-row n-row">
                <input type="text" class="nn" placeholder="Produk">
                <div class="row-flex">
                    <input type="number" class="nq" placeholder="Qty" oninput="hitungNota()">
                    <input type="number" class="nh" placeholder="Harga" oninput="hitungNota()">
                </div>
            </div>
        </div>
        <button class="btn-add" onclick="tambahBaris('notaCont', 'n-row')">+ Tambah Item</button>
        <div style="font-weight:bold; margin: 10px 0;">Total Nota: <span id="nt_val">Rp 0</span></div>
        <input type="number" id="dp_input" placeholder="DP yang dibayar" oninput="hitungNota()">
        <button onclick="simpanNota()" style="background: var(--primary);">💾 SIMPAN NOTA</button>
    </div>

    <!-- 3. INPUT PENGELUARAN -->
    <div class="container" style="border-top: 5px solid var(--danger);">
        <h2 style="color: var(--danger);">Input Pengeluaran</h2>
        <div id="expCont">
            <div class="item-row x-row">
                <input type="text" class="xn" placeholder="Barang/Beban">
                <div class="row-flex">
                    <input type="number" class="xq" placeholder="Qty" oninput="hitungExp()">
                    <input type="number" class="xh" placeholder="Harga" oninput="hitungExp()">
                </div>
            </div>
        </div>
        <button class="btn-add" onclick="tambahBaris('expCont', 'x-row')">+ Tambah Item</button>
        <select id="xmetode"><option value="Cash">Ambil Dari: Cash</option><option value="BRI">Ambil Dari: BRI</option><option value="BNI">Ambil Dari: BNI</option></select>
        <button onclick="simpanExp()" style="background: var(--danger);">💸 SIMPAN PENGELUARAN (<span id="xt_val">Rp 0</span>)</button>
    </div>

    <!-- 4. PERALIHAN DANA (MUTASI) -->
    <div class="container" style="border-top: 5px solid var(--mutasi);">
        <h2 style="color: var(--mutasi);">Mutasi Dana</h2>
        <div class="row-flex">
            <select id="mdari"><option value="Cash">Dari: Cash</option><option value="BRI">Dari: BRI</option><option value="BNI">Dari: BNI</option></select>
            <select id="mke"><option value="BNI">Ke: BNI</option><option value="BRI">Ke: BRI</option><option value="Cash">Ke: Cash</option></select>
        </div>
        <input type="number" id="mamt" placeholder="Jumlah Nominal (Rp)">
        <button onclick="simpanMutasi()" style="background: var(--mutasi);">🔄 PROSES MUTASI</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx5eIIeBTbV9_ZV2SeE8MNJp3l59O7MdioRNTLIfXDmUj3ob4cLMQKGuiTWNV61HYWSGw/exec'; // GANTI DENGAN URL APPS SCRIPT ANDA

        window.onload = loadDashboard;

        async function loadDashboard() {
            try {
                const res = await fetch(scriptURL + "?action=getDashboard");
                const d = await res.json();
                document.getElementById('d_cash').innerText = "Rp " + d.cash.toLocaleString();
                document.getElementById('d_bri').innerText = "Rp " + d.bri.toLocaleString();
                document.getElementById('d_bni').innerText = "Rp " + d.bni.toLocaleString();
                document.getElementById('d_laba').innerText = "Rp " + d.laba.toLocaleString();
            } catch (e) { console.log("Dashboard belum sinkron."); }
        }

        function tambahBaris(id, cl) {
            const c = document.getElementById(id);
            const d = c.querySelector('.'+cl).cloneNode(true);
            d.querySelectorAll('input').forEach(i => i.value = '');
            c.appendChild(d);
        }

        function hitungEst() {
            let t = 0;
            document.querySelectorAll('.e-row').forEach(r => { t += (r.querySelector('.eq').value * r.querySelector('.eh').value) || 0; });
            document.getElementById('et_val').innerText = "Rp " + t.toLocaleString();
            document.getElementById('edp_val').innerText = "Rp " + (t * 0.5).toLocaleString();
            return t;
        }

        function kirimWA() {
            const t = hitungEst();
            let s = `*PENAWARAN ASHEEQA PRINTING*\nCustomer: ${document.getElementById('est_cs').value || '-'}\n\n`;
            document.querySelectorAll('.e-row').forEach(r => {
                const n = r.querySelector('.en').value || 'Item';
                const q = r.querySelector('.eq').value || 0;
                const h = r.querySelector('.eh').value || 0;
                if(q > 0) s += `• ${n} (${q}x) = Rp ${(q*h).toLocaleString()}\n`;
            });
            s += `\n*TOTAL: Rp ${t.toLocaleString()}*`;
            s += `\n*DP 50%: Rp ${(t*0.5).toLocaleString()}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(s)}`);
        }

        function hitungNota() {
            let t = 0;
            document.querySelectorAll('.n-row').forEach(r => { t += (r.querySelector('.nq').value * r.querySelector('.nh').value) || 0; });
            document.getElementById('nt_val').innerText = "Rp " + t.toLocaleString();
            return t;
        }

        async function simpanNota() {
            const t = hitungNota();
            const dp = document.getElementById('dp_input').value || 0;
            const data = {
                tipe: "Nota",
                nama: document.getElementById('cs').value,
                metode: document.getElementById('metode').value,
                total: t, dp: dp, sisa: t - dp,
                items: Array.from(document.querySelectorAll('.n-row')).map(r => ({ n: r.querySelector('.nn').value, q: r.querySelector('.nq').value, h: r.querySelector('.nh').value }))
            };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Nota Disimpan!"); location.reload();
        }

        function hitungExp() {
            let t = 0;
            document.querySelectorAll('.x-row').forEach(r => { t += (r.querySelector('.xq').value * r.querySelector('.xh').value) || 0; });
            document.getElementById('xt_val').innerText = "Rp " + t.toLocaleString();
            return t;
        }

        async function simpanExp() {
            const data = {
                tipe: "Pengeluaran",
                total: hitungExp(),
                metode: document.getElementById('xmetode').value,
                items: Array.from(document.querySelectorAll('.x-row')).map(r => ({ n: r.querySelector('.xn').value, q: r.querySelector('.xq').value, h: r.querySelector('.xh').value }))
            };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Pengeluaran Dicatat!"); location.reload();
        }

        async function simpanMutasi() {
            const data = {
                tipe: "Mutasi",
                dari: document.getElementById('mdari').value,
                ke: document.getElementById('mke').value,
                jumlah: document.getElementById('mamt').value
            };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Mutasi Berhasil!"); location.reload();
        }
    </script>
</body>
</html>
