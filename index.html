<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asheeqa Printing POS</title>
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --success: #27ae60; --danger: #c0392b; --mutasi: #e67e22; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; font-size: 14px; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #ddd; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1em; margin: 0 0 15px 0; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; }
        .btn-add { background: #f8f9fa; color: #555; border: 1px dashed #bbb; margin-bottom: 10px; }
        .item-row { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .row-flex { display: flex; gap: 8px; }
        .dash-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: #2c3e50; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .dash-card { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 6px; text-align: center; }
        .dash-card b { display: block; font-size: 12px; margin-top: 4px; }
        .table-res { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        table th, table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .tab-btn { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn button { flex: 1; background: #95a5a6; font-size: 12px; }
        .tab-btn button.active { background: var(--secondary); }
        #nota-title { display: none; text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        @media print {
            .dash-box, .filter-area, .btn-add, button, input, select, .container:not(#nota-section) { display: none !important; }
            #nota-section { display: block !important; border: none; }
            #nota-title { display: block !important; }
        }
    </style>
</head>
<body>

    <div class="container" style="display: flex; gap: 5px; margin-bottom: 10px;">
        <select id="f_month" onchange="loadDashboard()"></select>
        <select id="f_year" onchange="loadDashboard()"></select>
    </div>

    <div class="dash-box">
        <div class="dash-card"><small>Cash</small><b id="d_cash">Rp 0</b></div>
        <div class="dash-card"><small>BRI</small><b id="d_bri">Rp 0</b></div>
        <div class="dash-card"><small>BNI</small><b id="d_bni">Rp 0</b></div>
        <div class="dash-card" style="background:rgba(46,204,113,0.2)"><small>Pemasukan</small><b id="d_masuk">Rp 0</b></div>
        <div class="dash-card" style="background:rgba(231,76,60,0.2)"><small>Pengeluaran</small><b id="d_keluar">Rp 0</b></div>
        <div class="dash-card" style="background:var(--success)"><small>Laba</small><b id="d_laba">Rp 0</b></div>
    </div>

    <div class="container">
        <div class="tab-btn">
            <button id="btn-nota" class="active" onclick="switchTab('nota')">Riwayat Nota</button>
            <button id="btn-exp" onclick="switchTab('exp')">Riwayat Pengeluaran</button>
        </div>
        <div id="tab-nota" class="table-res">
            <table><thead><tr><th>Nama</th><th>Total</th><th>Status</th></tr></thead><tbody id="list-nota"></tbody></table>
        </div>
        <div id="tab-exp" class="table-res" style="display:none;">
            <table><thead><tr><th>Item</th><th>Total</th><th>Metode</th></tr></thead><tbody id="list-exp"></tbody></table>
        </div>
    </div>

    <div id="nota-section" class="container" style="border-top: 5px solid var(--primary);">
        <div id="nota-title"><h1>ASHEEQA PRINTING</h1><p>WA: 089699910769</p></div>
        <h2>Input Nota Pesanan</h2>
        <input type="text" id="cs" placeholder="Nama Pelanggan">
        <select id="met"><option value="Cash">Cash</option><option value="BRI">BRI</option><option value="BNI">BNI</option></select>
        <div id="nCont"><div class="item-row n-row"><input type="text" class="nn" placeholder="Produk"><div class="row-flex"><input type="number" class="nq" placeholder="Qty" oninput="reNota()"><input type="number" class="nh" placeholder="Harga" oninput="reNota()"></div></div></div>
        <button class="btn-add" onclick="addR('nCont', 'n-row')">+ Tambah Item</button>
        <p>Total: <b id="nt_txt">Rp 0</b></p>
        <input type="number" id="dp" placeholder="DP (Otomatis 50%)">
        <button onclick="saveAndPrint()" style="background: var(--success); margin-bottom: 5px;">🖨️ SIMPAN & CETAK</button>
        <div class="row-flex">
            <button onclick="saveN()" style="background: var(--primary); flex: 1;">💾 SIMPAN SAJA</button>
            <button onclick="window.print()" style="background: var(--secondary); flex: 1;">📄 HANYA CETAK</button>
        </div>
    </div>

    <div class="container" style="border-top: 5px solid var(--danger);">
        <h2>Input Pengeluaran</h2>
        <div id="xCont"><div class="item-row x-row"><input type="text" class="xn" placeholder="Keperluan"><div class="row-flex"><input type="number" class="xq" placeholder="Qty" oninput="reX()"><input type="number" class="xh" placeholder="Harga" oninput="reX()"></div></div></div>
        <button class="btn-add" onclick="addR('xCont', 'x-row')">+ Tambah Item</button>
        <button onclick="saveX()" style="background: var(--danger);">💸 SIMPAN PENGELUARAN (<span id="xt_val">0</span>)</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxCNkoJqLs54I-nnc05nyphAN1NWbOk-LcuabaF_uXwok-0tyhJE20Ez7aEk7m0EeIBfA/exec';

        window.onload = () => {
            const mSelect = document.getElementById('f_month');
            const ySelect = document.getElementById('f_year');
            const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
            const now = new Date();
            months.forEach((m, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = m; if(i === now.getMonth()) opt.selected = true; mSelect.appendChild(opt); });
            for(let y = now.getFullYear(); y >= 2024; y--) { let opt = document.createElement('option'); opt.value = y; opt.text = y; ySelect.appendChild(opt); }
            loadDashboard();
        };

        async function loadDashboard() {
            const m = document.getElementById('f_month').value;
            const y = document.getElementById('f_year').value;
            try {
                const res = await fetch(`${scriptURL}?action=getDashboard&month=${m}&year=${y}`);
                const d = await res.json();
                document.getElementById('d_cash').innerText = "Rp " + d.cash.toLocaleString();
                document.getElementById('d_bri').innerText = "Rp " + d.bri.toLocaleString();
                document.getElementById('d_bni').innerText = "Rp " + d.bni.toLocaleString();
                document.getElementById('d_masuk').innerText = "Rp " + d.masuk.toLocaleString();
                document.getElementById('d_keluar').innerText = "Rp " + d.keluar.toLocaleString();
                document.getElementById('d_laba').innerText = "Rp " + d.laba.toLocaleString();

                document.getElementById('list-nota').innerHTML = d.riwayatNota.map(r => `<tr><td>${r[1]}</td><td>${Number(r[3]).toLocaleString()}</td><td style="color:${r[5]<=0?'green':'red'}">${r[5]<=0?'Lunas':'Sisa '+Number(r[5]).toLocaleString()}</td></tr>`).join('');
                document.getElementById('list-exp').innerHTML = d.riwayatExp.map(r => `<tr><td>${JSON.parse(r[1])[0].n}...</td><td>${Number(r[2]).toLocaleString()}</td><td>${r[3]}</td></tr>`).join('');
            } catch(e) {}
        }

        function reNota() { let t = 0; document.querySelectorAll('.n-row').forEach(r => { t += (r.querySelector('.nq').value * r.querySelector('.nh').value) || 0; }); document.getElementById('nt_txt').innerText = "Rp " + t.toLocaleString(); document.getElementById('dp').value = t * 0.5; return t; }
        
        async function saveN() {
            const t = reNota(); const dp = document.getElementById('dp').value || 0;
            const est = new Date(); est.setDate(est.getDate() + 7);
            const data = { tipe: "Nota", nama: document.getElementById('cs').value, metode: document.getElementById('met').value, total: t, dp: dp, sisa: t - dp, items: Array.from(document.querySelectorAll('.n-row')).map(r => ({ n: r.querySelector('.nn').value, q: r.querySelector('.nq').value, h: r.querySelector('.nh').value })) };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert(`Berhasil!\nEstimasi Selesai: ${est.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'})}\n"Proses Pengerjaan 7 Hari Kerja Setelah Pembayaran DP"`);
            loadDashboard();
        }

        async function saveAndPrint() { await saveN(); window.print(); }
        function addR(id, cl) { const c = document.getElementById(id); const d = c.querySelector('.'+cl).cloneNode(true); d.querySelectorAll('input').forEach(i => i.value = ''); c.appendChild(d); }
        function switchTab(t) { document.getElementById('tab-nota').style.display = t==='nota'?'block':'none'; document.getElementById('tab-exp').style.display = t==='exp'?'block':'none'; document.getElementById('btn-nota').className = t==='nota'?'active':''; document.getElementById('btn-exp').className = t==='exp'?'active':''; }
        function reX() { let t = 0; document.querySelectorAll('.x-row').forEach(r => { t += (r.querySelector('.xq').value * r.querySelector('.xh').value) || 0; }); document.getElementById('xt_val').innerText = "Rp " + t.toLocaleString(); return t; }
        async function saveX() { const data = { tipe: "Pengeluaran", total: reX(), metode: 'Cash', items: Array.from(document.querySelectorAll('.x-row')).map(r => ({ n: r.querySelector('.xn').value, q: r.querySelector('.xq').value, h: r.querySelector('.xh').value })) }; await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) }); alert("Pengeluaran tersimpan!"); loadDashboard(); }
    </script>
</body>
</html>
