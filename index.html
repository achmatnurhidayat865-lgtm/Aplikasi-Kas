<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Asheeqa Printing POS vFinal</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; font-size: 13px; }
        .grid-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat { text-align: center; background: #2c3e50; color: white; padding: 10px; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-save { background: #2980b9; }
        .btn-print { background: #7f8c8d; }
        .btn-both { background: #27ae60; height: 50px; }
        .btn-wa { background: #25D366; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body>

<div class="no-print">
    <!-- Dashboard -->
    <div class="grid-dash">
        <div class="stat">Cash<br><span id="d_cash">0</span></div>
        <div class="stat">BNI<br><span id="d_bni">0</span></div>
        <div class="stat">BRI<br><span id="d_bri">0</span></div>
        <div class="stat" style="background:#27ae60">Masuk Bulan Ini<br><span id="d_masuk">0</span></div>
        <div class="stat" style="background:#c0392b">Keluar Bulan Ini<br><span id="d_keluar">0</span></div>
        <div class="stat" style="background:#f39c12">Piutang<br><span id="d_piutang">0</span></div>
        <div class="stat" style="background:#8e44ad; grid-column: span 3;">Total Keuntungan: <span id="d_laba">0</span></div>
    </div>

    <!-- Form Nota -->
    <div class="card">
        <h3>Input Nota Pemesanan</h3>
        <input type="text" id="cs" placeholder="Nama CS">
        <div id="items">
            <div class="item-row">
                <input type="text" class="nn" placeholder="Nama Barang">
                <div style="display:flex; gap:5px;">
                    <input type="number" class="nq" placeholder="Qty" oninput="hitung()">
                    <input type="number" class="nh" placeholder="Harga Satuan" oninput="hitung()">
                </div>
            </div>
        </div>
        <p>Total: <b id="tot_txt">Rp 0</b> | DP 50%: <b id="dp_txt">Rp 0</b></p>
        <select id="met"><option value="Cash">Cash</option><option value="BNI">BNI</option><option value="BRI">BRI</option></select>
        <button class="btn-save" onclick="proses(false)">SIMPAN</button>
        <button class="btn-print" onclick="window.print()">CETAK NOTA</button>
        <button class="btn-both" onclick="proses(true)">SIMPAN DAN CETAK</button>
        <button class="btn-wa" onclick="keWA()">ESTIMASI KE WA</button>
    </div>

    <!-- Peralihan & Pengeluaran -->
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
        <div class="card">
            <h3>Pengeluaran</h3>
            <input type="text" id="ex_n" placeholder="Barang/Kebutuhan">
            <input type="number" id="ex_h" placeholder="Total Biaya">
            <select id="ex_m"><option value="Cash">Cash</option><option value="BNI">BNI</option><option value="BRI">BRI</option></select>
            <button class="btn-save" style="background:#e74c3c" onclick="simpanEx()">SIMPAN</button>
        </div>
        <div class="card">
            <h3>Peralihan Dana</h3>
            <select id="tf_d"><option value="Cash">Dari Cash</option><option value="BNI">Dari BNI</option><option value="BRI">Dari BRI</option></select>
            <select id="tf_k"><option value="BNI">Ke BNI</option><option value="BRI">Ke BRI</option><option value="Cash">Ke Cash</option></select>
            <input type="number" id="tf_j" placeholder="Jumlah">
            <button class="btn-save" style="background:#f1c40f; color:black" onclick="alih()">PROSES</button>
        </div>
    </div>

    <h3>Riwayat Bulan Ini</h3>
    <table id="tabel_nota">
        <thead><tr><th>CS</th><th>Barang</th><th>Total</th><th>Bayar</th><th>Sisa</th><th>Metode</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<!-- Template Cetak -->
<div class="print-only">
    <center><h2>ASHEEQA PRINTING</h2><hr></center>
    <p>CS: <span id="p_cs"></span></p>
    <div id="p_items"></div>
    <hr>
    <p>Total: <span id="p_tot"></span></p>
    <p>Dibayar: <span id="p_dp"></span></p>
    <p>Sisa: <span id="p_sis"></span></p>
    <p>Metode: <span id="p_met"></span></p>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbwav6iKPn3ZBWGHXvQx2MAEIwSwjFnINvjE7QTrucMHvTtg0qW6PhMiYb55BYDPqL7k9w/exec';

    function hitung() {
        let t = 0;
        document.querySelectorAll('.item-row').forEach(r => {
            t += (r.querySelector('.nq').value * r.querySelector('.nh').value) || 0;
        });
        document.getElementById('tot_txt').innerText = "Rp " + t.toLocaleString();
        document.getElementById('dp_txt').innerText = "Rp " + (t * 0.5).toLocaleString();
        return t;
    }

    function keWA() {
        const cs = document.getElementById('cs').value;
        const n = document.querySelector('.nn').value;
        const q = document.querySelector('.nq').value;
        const h = document.querySelector('.nh').value;
        const t = q * h;
        const dp = t * 0.5;
        const msg = `*Estimasi Asheeqa Printing*\nCS: ${cs}\nBarang: ${n}\nQty: ${q}\nHarga: ${h}\nTotal: ${t}\n*DP 50%: ${dp}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    async function proses(p) {
        const t = hitung();
        const data = {
            tipe: "Nota",
            nama: document.getElementById('cs').value,
            total: t,
            dp: t * 0.5,
            metode: document.getElementById('met').value,
            items: [{n: document.querySelector('.nn').value, q: document.querySelector('.nq').value, h: document.querySelector('.nh').value}]
        };
        // Update tampilan cetak
        document.getElementById('p_cs').innerText = data.nama;
        document.getElementById('p_tot').innerText = t;
        document.getElementById('p_dp').innerText = data.dp;
        document.getElementById('p_sis').innerText = data.dp;
        document.getElementById('p_met').innerText = data.metode;

        await fetch(url, {method: 'POST', body: JSON.stringify(data)});
        alert("Berhasil!"); load();
        if(p) window.print();
    }

    async function load() {
        const res = await fetch(url + "?action=getDashboard");
        const d = await res.json();
        document.getElementById('d_cash').innerText = d.cash.toLocaleString();
        document.getElementById('d_bni').innerText = d.bni.toLocaleString();
        document.getElementById('d_bri').innerText = d.bri.toLocaleString();
        document.getElementById('d_masuk').innerText = d.masukBulanIni.toLocaleString();
        document.getElementById('d_keluar').innerText = d.keluarBulanIni.toLocaleString();
        document.getElementById('d_piutang').innerText = d.piutang.toLocaleString();
        document.getElementById('d_laba').innerText = d.laba.toLocaleString();
        
        let html = "";
        d.riwayatNota.forEach(r => {
            html += `<tr><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td></tr>`;
        });
        document.querySelector('#tabel_nota tbody').innerHTML = html;
    }

    window.onload = load;
</script>
</body>
</html>
