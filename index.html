<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asheeqa Printing POS vFinal</title>
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --success: #27ae60; --danger: #c0392b; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; font-size: 13px; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .grid-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--secondary); color: white; padding: 10px; border-radius: 8px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 4px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; color: white; border: none; transition: 0.3s; }
        .btn-blue { background: var(--primary); }
        .btn-gray { background: #7f8c8d; }
        .btn-green { background: var(--success); height: 50px; }
        .btn-wa { background: #25D366; }
        .item-row { border-bottom: 1px dashed #ddd; padding-bottom: 8px; margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 11px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
        .print-area { display: none; font-family: monospace; padding: 20px; }
    </style>
</head>
<body>

<div class="no-print">
    <!-- DASHBOARD -->
    <div class="grid-dash">
        <div class="stat-card">Cash<br><b id="d_cash">0</b></div>
        <div class="stat-card">BNI<br><b id="d_bni">0</b></div>
        <div class="stat-card">BRI<br><b id="d_bri">0</b></div>
        <div class="stat-card" style="background:var(--success)">Masuk Bulan Ini<br><b id="d_masuk">0</b></div>
        <div class="stat-card" style="background:var(--danger)">Keluar Bulan Ini<br><b id="d_keluar">0</b></div>
        <div class="stat-card" style="background:#f39c12">Piutang<br><b id="d_piutang">0</b></div>
        <div class="stat-card" style="background:#8e44ad; grid-column: span 3;">Total Keuntungan Bulan Ini: <b id="d_laba">0</b></div>
    </div>

    <!-- FORM PEMESANAN -->
    <div class="container">
        <h3>Input Nota & Pemesanan</h3>
        <input type="text" id="cs" placeholder="Nama Pelanggan / CS">
        <div id="items-container">
            <div class="item-row">
                <input type="text" class="nn" placeholder="Nama Barang">
                <div style="display:flex; gap:5px;">
                    <input type="number" class="nq" placeholder="Qty" oninput="hitungTotal()">
                    <input type="number" class="nh" placeholder="Harga Satuan" oninput="hitungTotal()">
                </div>
            </div>
        </div>
        <button type="button" onclick="tambahBaris()" style="background:#eee; color:#333; margin: 10px 0;">+ Tambah Item</button>
        <p>Total Pesanan: <b id="txt_total">Rp 0</b></p>
        <p>DP Otomatis (50%): <b id="txt_dp">Rp 0</b></p>
        <select id="metode"><option value="Cash">Cash</option><option value="BNI">BNI</option><option value="BRI">BRI</option></select>
        <button class="btn-blue" onclick="simpanData(false)">SIMPAN</button>
        <button class="btn-gray" onclick="window.print()">CETAK NOTA</button>
        <button class="btn-green" onclick="simpanData(true)">SIMPAN DAN CETAK</button>
        <button class="btn-wa" onclick="kirimWA()">ESTIMASI KE WA</button>
    </div>

    <!-- FITUR CARI (BARU) -->
    <div class="container" style="background: #eef2f7; border-left: 5px solid var(--primary);">
        <h4>Cari Riwayat (Semua Bulan)</h4>
        <div style="display:flex; gap:10px;">
            <input type="text" id="cari_input" placeholder="Nama CS atau Nama Barang...">
            <button onclick="cariRiwayat()" style="width:120px; background:var(--secondary);">CARI</button>
        </div>
    </div>

    <!-- TABEL RIWAYAT -->
    <div class="container">
        <h3>Riwayat Pemesanan</h3>
        <table id="tabel_nota">
            <thead><tr><th>CS</th><th>Barang</th><th>Total</th><th>Bayar</th><th>Sisa</th><th>Metode</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbzuO7Cz3UvJ5jDl8xNa1-82aSOEbq-XAaKEFBR5CIvh2BRBiUG9B6bax98XwrrmskMr4A/exec';

    function tambahBaris() {
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `<input type="text" class="nn" placeholder="Nama Barang"><div style="display:flex; gap:5px;"><input type="number" class="nq" placeholder="Qty" oninput="hitungTotal()"><input type="number" class="nh" placeholder="Harga Satuan" oninput="hitungTotal()"></div>`;
        document.getElementById('items-container').appendChild(div);
    }

    function hitungTotal() {
        let grandTotal = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const q = row.querySelector('.nq').value || 0;
            const h = row.querySelector('.nh').value || 0;
            grandTotal += (q * h);
        });
        document.getElementById('txt_total').innerText = "Rp " + grandTotal.toLocaleString();
        document.getElementById('txt_dp').innerText = "Rp " + (grandTotal * 0.5).toLocaleString();
        return grandTotal;
    }

    // FUNGSI CARI RIWAYAT (BARU)
    async function cariRiwayat() {
        const keyword = document.getElementById('cari_input').value;
        if(!keyword) return alert("Masukkan kata kunci pencarian!");
        
        document.querySelector("#tabel_nota tbody").innerHTML = "<tr><td colspan='6' align='center'>Mencari...</td></tr>";
        
        const res = await fetch(webAppUrl + "?action=searchData&key=" + keyword);
        const d = await res.json();
        
        let htmlNota = "";
        if(d.length === 0) {
            htmlNota = "<tr><td colspan='6' align='center'>Data tidak ditemukan</td></tr>";
        } else {
            d.forEach(r => {
                let brg = "";
                try { const list = JSON.parse(r[2]); brg = list.map(i => `${i.n} (${i.q}x${i.h})`).join("<br>"); } 
                catch(e) { brg = r[2]; }
                htmlNota += `<tr><td>${r[1]}</td><td>${brg}</td><td>${Number(r[3]).toLocaleString()}</td><td>${Number(r[4]).toLocaleString()}</td><td>${Number(r[5]).toLocaleString()}</td><td>${r[6]}</td></tr>`;
            });
        }
        document.querySelector("#tabel_nota tbody").innerHTML = htmlNota;
    }

    async function simpanData(isPrint) {
        const total = hitungTotal();
        const items = Array.from(document.querySelectorAll('.item-row')).map(r => ({
            n: r.querySelector('.nn').value,
            q: r.querySelector('.nq').value,
            h: r.querySelector('.nh').value
        }));
        
        const payload = { tipe: "Nota", nama: document.getElementById('cs').value, total: total, dp: total * 0.5, metode: document.getElementById('metode').value, items: items };

        await fetch(webAppUrl, { method: 'POST', body: JSON.stringify(payload) });
        alert("Nota Berhasil Disimpan!");
        if(isPrint) window.print();
        location.reload();
    }

    async function loadData() {
        const res = await fetch(webAppUrl + "?action=getDashboard");
        const d = await res.json();
        
        document.getElementById('d_cash').innerText = d.cash.toLocaleString();
        document.getElementById('d_bni').innerText = d.bni.toLocaleString();
        document.getElementById('d_bri').innerText = d.bri.toLocaleString();
        document.getElementById('d_masuk').innerText = d.masukBulanIni.toLocaleString();
        document.getElementById('d_keluar').innerText = d.keluarBulanIni.toLocaleString();
        document.getElementById('d_piutang').innerText = d.piutang.toLocaleString();
        document.getElementById('d_laba').innerText = (d.masukBulanIni - d.keluarBulanIni).toLocaleString();

        let hNota = "";
        d.riwayatNota.forEach(r => {
            let brg = "";
            try { const list = JSON.parse(r[2]); brg = list.map(i => `${i.n} (${i.q}x${i.h})`).join("<br>"); } 
            catch(e) { brg = r[2]; }
            hNota += `<tr><td>${r[1]}</td><td>${brg}</td><td>${Number(r[3]).toLocaleString()}</td><td>${Number(r[4]).toLocaleString()}</td><td>${Number(r[5]).toLocaleString()}</td><td>${r[6]}</td></tr>`;
        });
        document.querySelector("#tabel_nota tbody").innerHTML = hNota;
    }

    window.onload = loadData;
</script>
</body>
</html>
