<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asheeqa Printing POS</title>
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --success: #27ae60; --danger: #c0392b; --mutasi: #e67e22; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #ddd; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1.1em; margin: 0 0 15px 0; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; }
        .btn-add { background: #f8f9fa; color: #555; border: 1px dashed #bbb; margin-bottom: 10px; }
        .item-row { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .row-flex { display: flex; gap: 8px; }
        
        /* Dashboard Styling */
        .dash-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: #2c3e50; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .dash-card { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 6px; text-align: center; }
        .dash-card small { font-size: 10px; opacity: 0.8; text-transform: uppercase; }
        .dash-card b { display: block; font-size: 13px; margin-top: 4px; }
        .info-dp { background: #fff9e6; border: 1px solid #f1c40f; padding: 10px; border-radius: 8px; margin: 10px 0; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <!-- DASHBOARD LENGKAP -->
    <div class="dash-box">
        <div style="grid-column: span 3; font-size: 14px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 5px;">Dashboard Keuangan</div>
        <div class="dash-card"><small>Cash</small><b id="d_cash">Rp 0</b></div>
        <div class="dash-card"><small>BRI</small><b id="d_bri">Rp 0</b></div>
        <div class="dash-card"><small>BNI</small><b id="d_bni">Rp 0</b></div>
        <div class="dash-card" style="background:rgba(46,204,113,0.2)"><small>Pemasukan</small><b id="d_masuk" style="color:#2ecc71">Rp 0</b></div>
        <div class="dash-card" style="background:rgba(231,76,60,0.2)"><small>Pengeluaran</small><b id="d_keluar" style="color:#e74c3c">Rp 0</b></div>
        <div class="dash-card" style="background:var(--success)"><small>Laba</small><b id="d_laba">Rp 0</b></div>
    </div>

    <!-- ESTIMASI -->
    <div class="container" style="border-top: 5px solid var(--accent);">
        <h2 style="color: var(--accent);">Kalkulator Estimasi</h2>
        <input type="text" id="est_cs" placeholder="Nama Pelanggan">
        <div id="estCont"><div class="item-row e-row"><input type="text" class="en" placeholder="Item/Jasa"><div class="row-flex"><input type="number" class="eq" placeholder="Qty" oninput="reEst()"><input type="number" class="eh" placeholder="Harga" oninput="reEst()"></div></div></div>
        <button class="btn-add" onclick="addR('estCont', 'e-row')">+ Tambah Item</button>
        <div class="info-dp">
            Total: <b id="et_val" style="color:#333">Rp 0</b> | 
            DP 50%: <b id="edp_val" style="color:var(--danger)">Rp 0</b>
        </div>
        <button onclick="sendWA()" style="background: #25D366;">📱 KIRIM KE WHATSAPP</button>
    </div>

    <!-- NOTA -->
    <div class="container" style="border-top: 5px solid var(--primary);">
        <h2 style="color: var(--primary);">Input Nota</h2>
        <input type="text" id="cs" placeholder="Nama Pelanggan">
        <select id="met"><option value="Cash">Simpan Ke: Cash</option><option value="BRI">Simpan Ke: BRI</option><option value="BNI">Simpan Ke: BNI</option></select>
        <div id="nCont"><div class="item-row n-row"><input type="text" class="nn" placeholder="Produk"><div class="row-flex"><input type="number" class="nq" placeholder="Qty" oninput="reNota()"><input type="number" class="nh" placeholder="Harga" oninput="reNota()"></div></div></div>
        <button class="btn-add" onclick="addR('nCont', 'n-row')">+ Tambah Item</button>
        <input type="number" id="dp" placeholder="DP/Bayar Sekarang" oninput="reNota()">
        <button id="btnS" onclick="saveN()" style="background: var(--primary);">💾 SIMPAN NOTA (Total: <span id="nt_val">0</span>)</button>
    </div>

    <!-- PENGELUARAN -->
    <div class="container" style="border-top: 5px solid var(--danger);">
        <h2 style="color: var(--danger);">Input Pengeluaran</h2>
        <div id="xCont"><div class="item-row x-row"><input type="text" class="xn" placeholder="Keperluan"><div class="row-flex"><input type="number" class="xq" placeholder="Qty" oninput="reX()"><input type="number" class="xh" placeholder="Harga" oninput="reX()"></div></div></div>
        <button class="btn-add" onclick="addR('xCont', 'x-row')">+ Tambah Item</button>
        <select id="xmet"><option value="Cash">Ambil Dari: Cash</option><option value="BRI">Ambil Dari: BRI</option><option value="BNI">Ambil Dari: BNI</option></select>
        <button onclick="saveX()" style="background: var(--danger);">💸 SIMPAN PENGELUARAN (<span id="xt_val">0</span>)</button>
    </div>

    <!-- MUTASI -->
    <div class="container" style="border-top: 5px solid var(--mutasi);">
        <h2 style="color: var(--mutasi);">Mutasi Dana</h2>
        <div class="row-flex"><select id="mdari"><option value="Cash">Dari: Cash</option><option value="BRI">Dari: BRI</option><option value="BNI">Dari: BNI</option></select><select id="mke"><option value="BNI">Ke: BNI</option><option value="BRI">Ke: BRI</option><option value="Cash">Ke: Cash</option></select></div>
        <input type="number" id="mamt" placeholder="Jumlah (Rp)">
        <button onclick="saveM()" style="background: var(--mutasi);">🔄 PROSES MUTASI</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxUpe2vlzlZexLbC6vO-mHrle216KSmLfV_mE4IZL3_fy9RcQ7bKZzIjtE8NzlremIY1g/exec';

        window.onload = async () => {
            try {
                const res = await fetch(scriptURL + "?action=getDashboard");
                const d = await res.json();
                document.getElementById('d_cash').innerText = "Rp " + d.cash.toLocaleString();
                document.getElementById('d_bri').innerText = "Rp " + d.bri.toLocaleString();
                document.getElementById('d_bni').innerText = "Rp " + d.bni.toLocaleString();
                document.getElementById('d_masuk').innerText = "Rp " + d.masuk.toLocaleString();
                document.getElementById('d_keluar').innerText = "Rp " + d.keluar.toLocaleString();
                document.getElementById('d_laba').innerText = "Rp " + d.laba.toLocaleString();
            } catch(e) {}
        };

        function addR(id, cl) {
            const c = document.getElementById(id);
            const d = c.querySelector('.'+cl).cloneNode(true);
            d.querySelectorAll('input').forEach(i => i.value = '');
            c.appendChild(d);
        }

        function reEst() {
            let t = 0; document.querySelectorAll('.e-row').forEach(r => { t += (r.querySelector('.eq').value * r.querySelector('.eh').value) || 0; });
            document.getElementById('et_val').innerText = "Rp " + t.toLocaleString();
            document.getElementById('edp_val').innerText = "Rp " + (t * 0.5).toLocaleString();
            return t;
        }

        function sendWA() {
            const t = reEst();
            let s = `*ESTIMASI ASHEEQA PRINTING*\nPelanggan: ${document.getElementById('est_cs').value || '-'}\n\n`;
            document.querySelectorAll('.e-row').forEach(r => { 
                const n = r.querySelector('.en').value || 'Item';
                const q = r.querySelector('.eq').value || 0;
                const h = r.querySelector('.eh').value || 0;
                if(q>0) s += `• ${n} (${q}x) = Rp ${(q*h).toLocaleString()}\n`; 
            });
            s += `\n*TOTAL: Rp ${t.toLocaleString()}*`;
            s += `\n*DP 50%: Rp ${(t*0.5).toLocaleString()}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(s)}`);
        }

        function reNota() {
            let t = 0; document.querySelectorAll('.n-row').forEach(r => { t += (r.querySelector('.nq').value * r.querySelector('.nh').value) || 0; });
            document.getElementById('nt_val').innerText = t.toLocaleString(); return t;
        }

        async function saveN() {
            const t = reNota(); const dp = document.getElementById('dp').value || 0;
            const data = { tipe: "Nota", nama: document.getElementById('cs').value, metode: document.getElementById('met').value, total: t, dp: dp, sisa: t - dp, items: Array.from(document.querySelectorAll('.n-row')).map(r => ({ n: r.querySelector('.nn').value, q: r.querySelector('.nq').value, h: r.querySelector('.nh').value })) };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Nota Berhasil!"); location.reload();
        }

        function reX() {
            let t = 0; document.querySelectorAll('.x-row').forEach(r => { t += (r.querySelector('.xq').value * r.querySelector('.xh').value) || 0; });
            document.getElementById('xt_val').innerText = t.toLocaleString(); return t;
        }

        async function saveX() {
            const data = { tipe: "Pengeluaran", total: reX(), metode: document.getElementById('xmet').value, items: Array.from(document.querySelectorAll('.x-row')).map(r => ({ n: r.querySelector('.xn').value, q: r.querySelector('.xq').value, h: r.querySelector('.xh').value })) };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Pengeluaran Berhasil!"); location.reload();
        }

        async function saveM() {
            const data = { tipe: "Mutasi", dari: document.getElementById('mdari').value, ke: document.getElementById('mke').value, jumlah: document.getElementById('mamt').value };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            alert("Mutasi Berhasil!"); location.reload();
        }
    </script>
</body>
</html>
